name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar dependencias e rodar testes
      run: |
        cd app
        npm install
        npm test

    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build e Push da Imagem Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/node-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/node-api:${{ github.sha }}

    - name: Deploy no Kubernetes
      uses: tale/kubectl-action@v1
      with:
        base64-kube-config: ${{ secrets.KUBE_CONFIG }}
      env:
        KUBECTL_VERSION: v1.29.0
    - run: |
        kubectl set image deployment/node-api-deployment \
          node-api=${{ secrets.DOCKERHUB_USERNAME }}/node-api:${{ github.sha }}
        kubectl rollout status deployment/node-api-deployment